<form [formGroup]="registerForm" (ngSubmit)="onRegisterSubmit()" class="mx-auto my-3">
  <!-- full name -->
  <app-auth-input label="Full Name" formControlName="name" [control]="registerForm.get('name')" />

  <!-- User Name -->
  <app-auth-input
    label="User Name"
    formControlName="username"
    [control]="registerForm.get('username')"
  />
  <!-- Email Address -->
  <app-auth-input
    inputType="email"
    label="Email"
    formControlName="email"
    [control]="registerForm.get('email')"
  />
  <!-- Gender -->
  <app-auth-input
    inputType="select"
    label="Gender"
    formControlName="gender"
    [control]="registerForm.get('gender')"
  />
  <!-- Birth Date -->
  <app-auth-input
    inputType="date"
    label="Birth Date"
    formControlName="dateOfBirth"
    [control]="registerForm.get('dateOfBirth')"
  />
  <!-- Password -->
  <app-auth-input
    inputType="password"
    label="password"
    formControlName="password"
    [control]="registerForm.get('password')"
  />
  <!-- rePassword -->
  <app-auth-input
    inputType="password"
    label="rePassword"
    formControlName="rePassword"
    [formGroup]="registerForm"
    [control]="registerForm.get('rePassword')"
  />
  <!-- action buttons -->
  <div class="my-3">
    <button
      [disabled]="isLoading"
      class="cursor-pointer disabled:opacity-50 disabled:cursor-progress bg-main font-bold text-center w-full py-4 text-white rounded-3xl"
    >
      Create Account

      @if (isLoading) {
        <i class="fas fa-spinner fa-spin mx-1"></i>
      }
    </button>
  </div>

  @if (errorMessage) {
    <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4" role="alert">
      <p class="font-bold">{{ errorMessage }}</p>
    </div>
  }
  @if (successMessage) {
    <div class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4" role="alert">
      <p class="font-bold">{{ successMessage }}</p>
    </div>
  }
</form>
