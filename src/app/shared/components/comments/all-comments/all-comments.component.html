<div class="flex gap-3 py-4 group">
  <div class="shrink-0">
    <img
      [src]="comment.commentCreator.photo"
      [alt]="comment.commentCreator.name"
      class="w-10 h-10 rounded-full object-cover border border-gray-100"
    />
  </div>

  <div class="flex-1">
    <div class="bg-gray-100 rounded-2xl px-4 py-2 max-w-full">
      <div class="flex items-center gap-2 mb-0.5">
        <span class="font-bold text-sm text-gray-900 :underline cursor-pointer">
          {{ comment.commentCreator.name }}
        </span>
        <span class="text-xs text-gray-500"> @{{ comment.commentCreator.username }} </span>
      </div>

      <p class="text-sm text-gray-800 leading-relaxed wrap-break-word">
        {{ comment.content }}
      </p>

      @if (comment.image) {
        <img class="max-h-40 w-full object-cover object-top" [src]="comment.image" alt="" />
      }
    </div>

    <div class="flex items-center gap-4 mt-1 ml-2">
      <span class="text-xs text-gray-500">
        {{ comment.createdAt | date: 'shortTime' }}
      </span>

      <button class="text-xs font-semibold text-gray-600 hover:underline transition-colors">
        Like
      </button>

      <button class="text-xs font-semibold text-gray-600 hover:underline">Reply</button>

      @if (comment.repliesCount > 0) {
        <button
          class="flex items-center gap-1 text-xs font-medium text-blue-500 hover:bg-blue-50 -900/20 px-2 py-0.5 rounded-full transition-all"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-3.5 h-3.5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"
            />
          </svg>
          {{ comment.repliesCount }} replies
        </button>
      }
    </div>
  </div>
</div>
